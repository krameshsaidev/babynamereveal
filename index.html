<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baby Reveal</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle, #1a1200, #000);
  font-family: Arial, sans-serif;
  color: white;
  overflow: hidden;
}

.container {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
}

/* Text */
.text {
  position: absolute;
  width: 90%;
  opacity: 0;
  transform: translateY(20px);
  transition: all 1.2s ease;
}

.show {
  opacity: 1;
  transform: translateY(0);
}

.text p {
  font-size: clamp(18px, 5vw, 24px);
  line-height: 1.5;
}

/* Name container */
.name {
  font-size: clamp(40px, 10vw, 60px);
  color: gold;
  letter-spacing: 10px;
}

/* Letters */
.letter {
  display: inline-block;
  opacity: 0;
  transform: scale(0.5) translateY(20px);
  transition: all 0.5s ease;
}

.letter.show {
  opacity: 1;
  transform: scale(1) translateY(0);
  text-shadow: 0 0 20px gold;
}

/* Glow */
.glow {
  text-shadow: 0 0 20px gold;
}

/* Flash */
.flash {
  position: absolute;
  width: 100%;
  height: 100%;
  background: white;
  opacity: 0;
  transition: opacity 0.3s;
}
</style>
</head>

<body>

<div id="flash" class="flash"></div>

<div class="container">

  <!-- Script -->
  <div id="s1" class="text show">
    <p>In a world that never pauses…<br>something extraordinary did.</p>
  </div>

  <div id="s2" class="text">
    <p>Not loud…<br>not sudden…<br>but powerful.</p>
  </div>

  <div id="s3" class="text">
    <p>A presence.<br>A purpose.<br>A beginning.</p>
  </div>

  <div id="s4" class="text">
    <p>He is not just born…<br>he is meant to be.</p>
  </div>

  <div id="s5" class="text glow">
    <p>✨ Presenting…</p>
  </div>

  <!-- Name -->
  <div id="s6" class="text name"></div>

</div>

<script>
const scenes = ["s1","s2","s3","s4","s5"];
let i = 0;

function nextScene() {
  document.getElementById(scenes[i]).classList.remove("show");
  i++;

  if (i < scenes.length) {
    document.getElementById(scenes[i]).classList.add("show");

    let delay = (i === 4) ? 2000 : 1600;
    setTimeout(nextScene, delay);
  } else {
    // Suspense pause before name
    setTimeout(reveal, 1800);
  }
}

function reveal() {
  const flash = document.getElementById("flash");
  flash.style.opacity = 1;

  setTimeout(() => {
    flash.style.opacity = 0;
    showNameLetters();
  }, 300);
}

// Letter-by-letter reveal
function showNameLetters() {
  const name = "GATIK";
  const container = document.getElementById("s6");

  container.classList.add("show");

  name.split("").forEach((char, index) => {
    const span = document.createElement("span");
    span.textContent = char;
    span.classList.add("letter");
    container.appendChild(span);

    setTimeout(() => {
      span.classList.add("show");
    }, index * 400); // timing between letters
  });
}

// Start
setTimeout(nextScene, 1200);
</script>

</body>
</html>
