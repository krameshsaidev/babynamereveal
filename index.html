<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Little Miracle</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: 'Segoe UI', sans-serif;
  overflow: hidden;
}

/* Scene */
.scene {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  flex-direction: column;
  opacity: 0;
  transition: opacity 1.5s ease;
}

.scene.active { opacity: 1; }

/* Text */
h1 {
  font-size: 26px;
  padding: 20px;
}

/* Suspense blink */
.blink {
  animation: blink 1s infinite;
}
@keyframes blink {
  50% { opacity: 0.2; }
}

/* Flash */
.flash {
  position: fixed;
  width: 100%;
  height: 100%;
  background: white;
  opacity: 0;
  pointer-events: none;
}

/* Reveal text */
.reveal {
  font-size: 48px;
  letter-spacing: 12px;
  color: gold;
  text-shadow: 0 0 20px gold;
  opacity: 0;
  transform: scale(0.5);
  transition: all 1.5s ease;
}

/* Canvas */
canvas {
  position: fixed;
  top: 0;
  left: 0;
}

/* Mobile */
@media(max-width:600px){
  h1 { font-size: 22px; }
  .reveal { font-size: 34px; }
}
</style>
</head>

<body>

<canvas id="canvas"></canvas>
<div class="flash" id="flash"></div>

<!-- Scenes -->
<div class="scene active" id="s1">
  <h1>Some stories are written in the stars...</h1>
</div>

<div class="scene" id="s2">
  <h1>Ramesh Sai ❤️ Sri Laya</h1>
</div>

<div class="scene" id="s3">
  <h1>We waited...</h1>
  <h1>We dreamed...</h1>
</div>

<div class="scene" id="s4">
  <h1 class="blink">And then...</h1>
  <h1 class="blink">Everything changed</h1>
</div>

<div class="scene" id="s5">
  <h1 id="name" class="reveal"></h1>
</div>

<script>
const scenes = ["s1","s2","s3","s4","s5"];
const timings = [2500, 2500, 3000, 3500];

function show(id){
  document.querySelectorAll(".scene").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* CINEMATIC TIMELINE */
function timeline(){
  let t = 0;

  timings.forEach((d,i)=>{
    setTimeout(()=>show(scenes[i]), t);
    t += d;
  });

  // suspense pause (no scene change)
  setTimeout(()=>{
    glitchFlash();
  }, t);

  setTimeout(()=>{
    show("s5");
    explode();
  }, t + 1200);
}

/* FLASH + SHAKE */
function glitchFlash(){
  const flash = document.getElementById("flash");

  flash.style.opacity = 1;
  setTimeout(()=>flash.style.opacity = 0, 100);

  document.body.style.transform = "scale(1.02)";
  setTimeout(()=>document.body.style.transform = "scale(1)", 150);
}

/* CANVAS PARTICLE EXPLOSION */
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

function explode(){
  for(let i=0;i<120;i++){
    particles.push({
      x: canvas.width/2,
      y: canvas.height/2,
      angle: Math.random()*2*Math.PI,
      speed: Math.random()*6+2,
      size: Math.random()*3+1,
      life: 100
    });
  }

  animateParticles();

  setTimeout(()=>revealName("GATIK"), 600);
}

function animateParticles(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  particles.forEach(p=>{
    p.x += Math.cos(p.angle)*p.speed;
    p.y += Math.sin(p.angle)*p.speed;
    p.life--;

    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    ctx.fillStyle = "gold";
    ctx.fill();
  });

  particles = particles.filter(p=>p.life>0);

  if(particles.length>0){
    requestAnimationFrame(animateParticles);
  }
}

/* NAME REVEAL */
function revealName(text){
  const el = document.getElementById("name");
  el.style.opacity = 1;
  el.style.transform = "scale(1)";

  let i = 0;
  function type(){
    if(i < text.length){
      el.innerHTML += text[i];
      i++;
      setTimeout(type, 120);
    }
  }
  type();
}

/* START */
timeline();
</script>

</body>
</html>
