<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Little Miracle</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: 'Segoe UI', sans-serif;
  overflow: hidden;
}

/* Scene system */
.scene {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  opacity: 0;
  transform: scale(1.05);
  transition: opacity 1.5s ease, transform 2s ease;
}

.scene.active {
  opacity: 1;
  transform: scale(1);
}

/* Floating particles */
.particles span {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  opacity: 0.4;
  animation: floatUp linear infinite;
}

@keyframes floatUp {
  from { transform: translateY(100vh); }
  to { transform: translateY(-10vh); }
}

/* Text */
h1 {
  font-size: 26px;
  padding: 20px;
  animation: fadeUp 2s ease;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Heart pulse */
.heart {
  color: #ff4d6d;
  animation: heartbeat 1.2s infinite;
}

@keyframes heartbeat {
  0%,100% { transform: scale(1); }
  25% { transform: scale(1.3); }
  50% { transform: scale(1); }
}

/* Suspense blur */
.blur {
  filter: blur(6px);
  opacity: 0.6;
}

/* Reveal */
.reveal {
  font-size: 46px;
  letter-spacing: 12px;
  color: gold;
  text-shadow: 0 0 10px gold, 0 0 40px gold;
  opacity: 0;
  transform: scale(0.5);
}

/* Light burst */
.burst {
  position: absolute;
  width: 10px;
  height: 10px;
  background: gold;
  border-radius: 50%;
  opacity: 0;
}

.burst.animate {
  animation: explode 1.5s ease-out forwards;
}

@keyframes explode {
  0% { transform: scale(1); opacity: 1; }
  100% { transform: scale(80); opacity: 0; }
}

/* Mobile */
@media(max-width:600px){
  h1 { font-size: 22px; }
  .reveal { font-size: 34px; }
}
</style>
</head>

<body>

<div class="particles" id="particles"></div>

<!-- Scene 1 -->
<div class="scene active">
  <h1>Some stories are written in the stars...</h1>
</div>

<!-- Scene 2 -->
<div class="scene">
  <h1>Ramesh Sai <span class="heart">❤</span> Sri Laya</h1>
</div>

<!-- Scene 3 -->
<div class="scene">
  <h1>We waited...</h1>
  <h1>We dreamed...</h1>
  <h1>For this moment...</h1>
</div>

<!-- Scene 4 -->
<div class="scene">
  <h1 class="blur">And then...</h1>
  <h1 class="blur">Everything changed</h1>
</div>

<!-- Scene 5 -->
<div class="scene">
  <div class="burst" id="burst"></div>
  <h1 id="name" class="reveal"></h1>
</div>

<script>
const scenes = document.querySelectorAll(".scene");
let current = 0;

// Scene timings
const timings = [3000, 3000, 3500, 3000, 4000];

function showScene(index) {
  scenes.forEach(s => s.classList.remove("active"));
  scenes[index].classList.add("active");
}

// Particle generator
const container = document.getElementById("particles");
for (let i = 0; i < 60; i++) {
  const p = document.createElement("span");
  p.style.left = Math.random() * 100 + "vw";
  p.style.animationDuration = (5 + Math.random() * 10) + "s";
  p.style.opacity = Math.random();
  container.appendChild(p);
}

// Play sequence
function play() {
  let total = 0;

  timings.forEach((t, i) => {
    setTimeout(() => {
      showScene(i);

      if (i === 4) {
        triggerReveal();
      }

    }, total);

    total += t;
  });
}

function triggerReveal() {
  const burst = document.getElementById("burst");
  const name = document.getElementById("name");

  burst.classList.add("animate");

  setTimeout(() => {
    name.style.opacity = 1;
    name.style.transform = "scale(1)";
    typeName("GATIK");
  }, 800);
}

function typeName(text) {
  let i = 0;
  const el = document.getElementById("name");

  function type() {
    if (i < text.length) {
      el.innerHTML += text[i];
      i++;
      setTimeout(type, 120);
    }
  }

  type();
}

// Start automatically
play();
</script>

</body>
</html>
