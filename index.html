<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baby Reveal</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  overflow: hidden;
  font-family: 'Cinzel', serif;
  background: radial-gradient(circle, #1a1200, #000);
  color: white;
}

/* Mobile-safe container */
.container {
  position: relative;
  width: 100%;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* Text block */
.text {
  position: absolute;
  width: 90%;
  text-align: center;
  opacity: 0;
  transform: scale(0.95);
  transition: all 1.2s ease;
  padding: 0 10px;
}

/* Responsive font */
.text p {
  font-size: clamp(1.2rem, 5vw, 1.8rem);
  letter-spacing: 2px;
  line-height: 1.4;
}

.show {
  opacity: 1;
  transform: scale(1);
}

/* Name styling */
.name {
  font-size: clamp(2rem, 10vw, 3.5rem);
  color: gold;
  letter-spacing: 6px;
  text-shadow:
    0 0 10px gold,
    0 0 40px rgba(255,215,0,0.7);
}

/* Background glow */
.bg-glow {
  position: absolute;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(255,215,0,0.1), transparent);
  animation: float 12s linear infinite;
  z-index: 0;
}

@keyframes float {
  from { transform: translate(-10%, -10%); }
  to { transform: translate(10%, 10%); }
}

/* Canvas */
canvas {
  position: absolute;
  width: 100%;
  height: 100%;
  z-index: 1;
}

/* Text above canvas */
.text { z-index: 2; }

/* Flash */
.flash {
  position: absolute;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, rgba(255,215,0,0.7), transparent);
  opacity: 0;
  z-index: 3;
}
</style>
</head>

<body>

<div class="bg-glow"></div>
<div id="flash" class="flash"></div>
<canvas id="canvas"></canvas>

<div class="container">
  <div id="s1" class="text"><p>A presence is felt...</p></div>
  <div id="s2" class="text"><p>Not seen... but known...</p></div>
  <div id="s3" class="text"><p>Something powerful is arriving...</p></div>
  <div id="s4" class="text"><p>The moment is near...</p></div>
  <div id="s5" class="text"><p>Hold your breath...</p></div>
  <div id="s6" class="text name">GATIK</div>
</div>

<script>
// Scenes
const scenes = ["s1","s2","s3","s4","s5"];
let i = 0;

function nextScene(){
  if(i>0) document.getElementById(scenes[i-1]).classList.remove("show");

  if(i < scenes.length){
    document.getElementById(scenes[i]).classList.add("show");
    i++;
    setTimeout(nextScene, 1600);
  } else {
    setTimeout(reveal, 1200);
  }
}

// Reveal
function reveal(){
  document.getElementById("flash").style.opacity = 1;
  setTimeout(()=> document.getElementById("flash").style.opacity = 0, 300);

  collapseParticles();
  document.getElementById("s6").classList.add("show");
}

// Canvas
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

let particles = [];

// Initial particles
for(let i=0;i<120;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    vx:(Math.random()-0.5),
    vy:(Math.random()-0.5)
  });
}

// Collapse into text
function collapseParticles(){
  const off = document.createElement("canvas");
  const offCtx = off.getContext("2d");

  off.width = canvas.width;
  off.height = canvas.height;

  offCtx.fillStyle = "white";
  offCtx.font = "bold 60px Cinzel";
  offCtx.textAlign = "center";
  offCtx.fillText("GATIK", off.width/2, off.height/2);

  const data = offCtx.getImageData(0,0,off.width,off.height).data;

  let targets = [];

  for(let y=0;y<off.height;y+=6){
    for(let x=0;x<off.width;x+=6){
      if(data[(y*off.width+x)*4] > 128){
        targets.push({x,y});
      }
    }
  }

  particles = particles.map((p,i)=>({
    x:p.x,
    y:p.y,
    tx:targets[i%targets.length].x,
    ty:targets[i%targets.length].y
  }));
}

// Animate
function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  particles.forEach(p=>{
    if(p.tx){
      p.x += (p.tx - p.x)*0.08;
      p.y += (p.ty - p.y)*0.08;
    } else {
      p.x += p.vx;
      p.y += p.vy;
    }

    ctx.beginPath();
    ctx.arc(p.x,p.y,2,0,Math.PI*2);
    ctx.fillStyle="gold";
    ctx.fill();
  });

  requestAnimationFrame(animate);
}

animate();
setTimeout(nextScene, 1000);
</script>

</body>
</html>
