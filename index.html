<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Divine Reveal</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: radial-gradient(circle, #0a0a0f, #000);
  overflow: hidden;
  color: white;
  font-family: 'Cinzel', serif;
}

/* Center */
.container {
  position: absolute;
  width: 100%;
  height: 100%;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* Cinematic text */
.text {
  position:absolute;
  opacity:0;
  transform:scale(0.85);
  transition: all 1.5s ease;
  text-align:center;
  letter-spacing:4px;
}

.show {
  opacity:1;
  transform:scale(1);
}

/* Trailer style */
.title {
  font-size: 2rem;
  color:#ddd;
  text-transform:uppercase;
}

/* Name */
.name {
  font-size: 3rem;
  color: gold;
  text-shadow:
    0 0 10px gold,
    0 0 30px rgba(255,215,0,0.8),
    0 0 60px rgba(255,215,0,0.5);
}

/* Canvas */
canvas {
  position:absolute;
  top:0;
  left:0;
}
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<div class="container">
  <div id="s1" class="text title">A Divine Blessing...</div>
  <div id="s2" class="text title">A New Beginning...</div>
  <div id="s3" class="text title">From the Universe...</div>
  <div id="s4" class="text title">A Soul Arrives</div>
  <div id="s5" class="text title">Presenting...</div>
  <div id="s6" class="text name">GATIK</div>
</div>

<script>
// FONT LOAD DELAY (cinematic feel)
document.fonts.ready.then(() => {
  setTimeout(startShow, 500);
});

// SCENES
const scenes = ["s1","s2","s3","s4","s5","s6"];
let i = 0;

function startShow(){
  nextScene();
}

function nextScene(){
  if(i>0) document.getElementById(scenes[i-1]).classList.remove("show");

  if(i<scenes.length){
    document.getElementById(scenes[i]).classList.add("show");

    if(i===5){
      playBell();
      particleText();
    }

    i++;
    setTimeout(nextScene, i===5 ? 2500 : 1800);
  }
}

// TEMPLE BELL SOUND (no file)
function playBell(){
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();

  osc.type = "sine";
  osc.frequency.setValueAtTime(432, ctx.currentTime);

  gain.gain.setValueAtTime(1, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 3);

  osc.connect(gain);
  gain.connect(ctx.destination);

  osc.start();
  osc.stop(ctx.currentTime + 3);
}

// PARTICLE TEXT FORMATION
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

function particleText(){
  const off = document.createElement("canvas");
  const offCtx = off.getContext("2d");

  off.width = canvas.width;
  off.height = canvas.height;

  offCtx.fillStyle = "white";
  offCtx.font = "bold 80px Cinzel";
  offCtx.textAlign = "center";
  offCtx.fillText("GATIK", off.width/2, off.height/2);

  const data = offCtx.getImageData(0,0,off.width,off.height).data;

  particles = [];

  for(let y=0; y<off.height; y+=6){
    for(let x=0; x<off.width; x+=6){
      const index = (y * off.width + x) * 4;
      if(data[index] > 128){
        particles.push({
          x: Math.random()*canvas.width,
          y: Math.random()*canvas.height,
          tx: x,
          ty: y,
          size:2
        });
      }
    }
  }

  animateParticles();
}

function animateParticles(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  particles.forEach(p=>{
    p.x += (p.tx - p.x)*0.08;
    p.y += (p.ty - p.y)*0.08;

    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    ctx.fillStyle="gold";
    ctx.fill();
  });

  requestAnimationFrame(animateParticles);
}
</script>

</body>
</html>
