<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Little Miracle</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: 'Segoe UI', sans-serif;
  overflow: hidden;
}

/* Scene container */
.scene {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  opacity: 0;
  transition: opacity 1.5s ease;
}

.scene.active {
  opacity: 1;
}

/* Stars background */
.stars {
  position: absolute;
  width: 100%;
  height: 100%;
  background: radial-gradient(white 1px, transparent 1px);
  background-size: 3px 3px;
  opacity: 0.15;
  animation: moveStars 80s linear infinite;
}

@keyframes moveStars {
  from { transform: translateY(0); }
  to { transform: translateY(-1000px); }
}

/* Text styles */
h1 {
  font-size: 28px;
  padding: 20px;
}

h2 {
  font-size: 24px;
}

.small {
  opacity: 0.7;
  font-size: 18px;
}

/* Heart pulse */
.heart {
  color: #ff4d6d;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.2); }
}

/* Reveal */
.reveal {
  font-size: 42px;
  letter-spacing: 10px;
  color: gold;
  text-shadow: 0 0 10px gold, 0 0 30px gold;
  opacity: 0;
  transform: scale(0.8);
  transition: all 1.5s ease;
}

.reveal.show {
  opacity: 1;
  transform: scale(1);
}

/* Mobile tuning */
@media (max-width: 600px) {
  h1 { font-size: 22px; }
  .reveal { font-size: 34px; }
}
</style>
</head>

<body>

<div class="stars"></div>

<!-- Scene 1 -->
<div class="scene active" id="scene1">
  <h1>Some stories are written in the stars...</h1>
</div>

<!-- Scene 2 -->
<div class="scene" id="scene2">
  <h2>Ramesh Sai <span class="heart">❤</span> Sri Laya</h2>
</div>

<!-- Scene 3 -->
<div class="scene" id="scene3">
  <p>We waited...</p>
  <p>We dreamed...</p>
  <p>For this moment...</p>
</div>

<!-- Scene 4 -->
<div class="scene" id="scene4">
  <p class="small">And then...</p>
  <p class="small">Everything changed</p>
</div>

<!-- Scene 5 -->
<div class="scene" id="scene5">
  <h1 id="name" class="reveal"></h1>
</div>

<script>
const scenes = document.querySelectorAll(".scene");
let current = 0;

function showScene(index) {
  scenes.forEach(s => s.classList.remove("active"));
  scenes[index].classList.add("active");
}

// Scene timing (in ms)
const timings = [3000, 3000, 3500, 3000, 4000];

function playScenes() {
  let total = 0;

  timings.forEach((time, i) => {
    setTimeout(() => {
      showScene(i);

      if (i === 4) revealName("GATIK");

    }, total);

    total += time;
  });
}

let revealed = false;

function revealName(text) {
  if (revealed) return;
  revealed = true;

  const el = document.getElementById("name");
  el.classList.add("show");

  let i = 0;
  function type() {
    if (i < text.length) {
      el.innerHTML += text[i];
      i++;
      setTimeout(type, 150);
    }
  }

  setTimeout(type, 500);
}

// Start automatically
playScenes();
</script>

</body>
</html>
