<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Arrival</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: 'Segoe UI', sans-serif;
  overflow: hidden;
}

/* Scene system */
.scene {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  opacity: 0;
  transform: scale(1.05);
  transition: opacity 2s ease, transform 2s ease;
}

.scene.active {
  opacity: 1;
  transform: scale(1);
}

/* Text */
.text {
  font-size: 26px;
  letter-spacing: 2px;
  max-width: 80%;
  line-height: 1.5;
}

/* Fade in slow */
.fade {
  animation: fadeIn 3s ease;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

/* Suspense pulse */
.pulse {
  animation: pulse 1.5s infinite;
}
@keyframes pulse {
  0%,100% { opacity: 1; }
  50% { opacity: 0.3; }
}

/* Flash */
.flash {
  position: fixed;
  width: 100%;
  height: 100%;
  background: white;
  opacity: 0;
  pointer-events: none;
}

/* Cinematic bars */
.bar {
  position: fixed;
  width: 100%;
  height: 10%;
  background: black;
  z-index: 10;
}
.top { top: 0; }
.bottom { bottom: 0; }

/* Title reveal */
.title {
  font-size: 50px;
  letter-spacing: 15px;
  color: gold;
  text-shadow: 0 0 20px gold;
  opacity: 0;
  transform: scale(0.7);
  transition: all 1.5s ease;
}

/* Mobile */
@media(max-width:600px){
  .text { font-size: 20px; }
  .title { font-size: 34px; }
}
</style>
</head>

<body>

<div class="bar top"></div>
<div class="bar bottom"></div>
<div class="flash" id="flash"></div>

<!-- Scene 1 -->
<div class="scene active" id="s1">
  <div class="text fade">In the quiet moments of life...</div>
</div>

<!-- Scene 2 -->
<div class="scene" id="s2">
  <div class="text fade">Two hearts dreamed of something more...</div>
</div>

<!-- Scene 3 -->
<div class="scene" id="s3">
  <div class="text fade">A journey filled with hope...</div>
</div>

<!-- Scene 4 -->
<div class="scene" id="s4">
  <div class="text fade">And endless love...</div>
</div>

<!-- Scene 5 (Suspense) -->
<div class="scene" id="s5">
  <div class="text pulse">And then...</div>
</div>

<!-- Scene 6 (Pause - nothing happens intentionally) -->
<div class="scene" id="s6"></div>

<!-- Scene 7 (Reveal) -->
<div class="scene" id="s7">
  <div id="name" class="title"></div>
</div>

<script>
const scenes = ["s1","s2","s3","s4","s5","s6","s7"];
const timings = [3000,3000,3000,3000,2000,1500];

function show(id){
  document.querySelectorAll(".scene").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* Timeline */
function play(){
  let t = 0;

  timings.forEach((d,i)=>{
    setTimeout(()=>show(scenes[i]), t);
    t += d;
  });

  // suspense pause already handled by empty scene

  setTimeout(()=>{
    impactReveal();
  }, t);
}

/* Impact reveal */
function impactReveal(){
  const flash = document.getElementById("flash");
  const name = document.getElementById("name");

  // flash hit
  flash.style.opacity = 1;
  setTimeout(()=>flash.style.opacity = 0, 150);

  // slight zoom shake
  document.body.style.transform = "scale(1.03)";
  setTimeout(()=>document.body.style.transform = "scale(1)", 200);

  // show name
  setTimeout(()=>{
    show("s7");
    name.innerHTML = "GATIK";
    name.style.opacity = 1;
    name.style.transform = "scale(1)";
  }, 200);
}

// start
play();
</script>

</body>
</html>
