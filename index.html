<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Divine Reveal</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  overflow:hidden;
  font-family:'Cinzel', serif;
  background: radial-gradient(circle at center, #1a1200, #000);
  color:white;
}

/* Floating divine glow */
.bg-glow {
  position:absolute;
  width:200%;
  height:200%;
  background: radial-gradient(circle, rgba(255,215,0,0.08), transparent);
  animation: float 10s infinite linear;
}

@keyframes float {
  from { transform: translate(-10%, -10%); }
  to { transform: translate(10%, 10%); }
}

/* Center */
.container {
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
}

/* Text */
.text {
  position:absolute;
  opacity:0;
  transform: scale(0.95);
  transition: all 1.5s ease;
  letter-spacing:4px;
}

.show {
  opacity:1;
  transform: scale(1);
}

/* Breathing glow */
@keyframes breathe {
  0% { text-shadow:0 0 10px gold; }
  50% { text-shadow:0 0 40px gold; }
  100% { text-shadow:0 0 10px gold; }
}

.breathe {
  animation:breathe 2.5s infinite;
}

/* Name */
.name {
  font-size:3.2rem;
  color:gold;
  letter-spacing:10px;
  text-shadow:
    0 0 20px gold,
    0 0 60px rgba(255,215,0,0.6);
}

/* Shock flash */
.flash {
  position:absolute;
  width:100%;
  height:100%;
  background: radial-gradient(circle, rgba(255,215,0,0.8), transparent);
  opacity:0;
}

/* Canvas */
canvas {
  position:absolute;
  top:0;
  left:0;
}
</style>
</head>

<body>

<div class="bg-glow"></div>
<div class="flash" id="flash"></div>

<canvas id="canvas"></canvas>

<div class="container">

  <div id="s1" class="text">A presence is felt...</div>
  <div id="s2" class="text">Not seen... but known...</div>

  <div id="s3" class="text breathe">Something powerful is arriving...</div>

  <div id="s4" class="text">And in this moment...</div>

  <div id="s5" class="text">Everything changes...</div>

  <div id="s6" class="text name">GATIK</div>

</div>

<script>
// SCENE FLOW WITH SILENCE GAP
const scenes = ["s1","s2","s3","s4","s5"];
let i=0;

function nextScene(){
  if(i>0) document.getElementById(scenes[i-1]).classList.remove("show");

  if(i<scenes.length){
    document.getElementById(scenes[i]).classList.add("show");
    i++;
    setTimeout(nextScene, 1800);
  } else {
    // SILENCE BEFORE REVEAL
    setTimeout(reveal, 1500);
  }
}

// REVEAL MOMENT
function reveal(){

  // flash
  const flash = document.getElementById("flash");
  flash.style.opacity = 1;
  setTimeout(()=> flash.style.opacity = 0, 300);

  // particle collapse → form
  collapseParticles();

  // show name
  document.getElementById("s6").classList.add("show");

  playBell();
}

// TEMPLE BELL SYNTH
function playBell(){
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();

  osc.frequency.setValueAtTime(432, ctx.currentTime);
  gain.gain.setValueAtTime(1, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+3);

  osc.connect(gain);
  gain.connect(ctx.destination);

  osc.start();
  osc.stop(ctx.currentTime+3);
}

// PARTICLES
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

// INITIAL FLOATING ENERGY
for(let i=0;i<150;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    vx:(Math.random()-0.5)*0.5,
    vy:(Math.random()-0.5)*0.5
  });
}

// COLLAPSE INTO NAME
function collapseParticles(){
  const off = document.createElement("canvas");
  const offCtx = off.getContext("2d");

  off.width = canvas.width;
  off.height = canvas.height;

  offCtx.fillStyle="white";
  offCtx.font="bold 90px Cinzel";
  offCtx.textAlign="center";
  offCtx.fillText("GATIK", off.width/2, off.height/2);

  const data = offCtx.getImageData(0,0,off.width,off.height).data;

  let targets=[];

  for(let y=0;y<off.height;y+=6){
    for(let x=0;x<off.width;x+=6){
      if(data[(y*off.width+x)*4]>128){
        targets.push({x,y});
      }
    }
  }

  particles = particles.map((p,i)=>({
    x:p.x,
    y:p.y,
    tx:targets[i%targets.length].x,
    ty:targets[i%targets.length].y
  }));
}

// ANIMATION LOOP
function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  particles.forEach(p=>{
    if(p.tx){
      p.x += (p.tx - p.x)*0.07;
      p.y += (p.ty - p.y)*0.07;
    } else {
      p.x += p.vx;
      p.y += p.vy;
    }

    ctx.beginPath();
    ctx.arc(p.x,p.y,2,0,Math.PI*2);
    ctx.fillStyle="gold";
    ctx.fill();
  });

  requestAnimationFrame(animate);
}

animate();
setTimeout(nextScene,1000);
</script>

</body>
</html>
