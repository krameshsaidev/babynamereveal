<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baby Reveal</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle, #1a1200, #000);
  font-family: Arial, sans-serif;
  color: white;
  overflow: hidden;
}

/* Container */
.container {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
}

/* Text */
.text {
  position: absolute;
  width: 90%;
  opacity: 0;
  transition: opacity 1s ease;
}

.show {
  opacity: 1;
}

/* Responsive text */
.text p {
  font-size: 22px;
}

/* Name */
.name {
  font-size: 42px;
  color: gold;
  letter-spacing: 5px;
}

/* Glow */
.glow {
  text-shadow: 0 0 20px gold;
}

/* Flash */
.flash {
  position: absolute;
  width: 100%;
  height: 100%;
  background: white;
  opacity: 0;
  transition: opacity 0.3s;
}
</style>
</head>

<body>

<div id="flash" class="flash"></div>

<div class="container">
  <div id="s1" class="text show"><p>A new journey begins...</p></div>
  <div id="s2" class="text"><p>Something beautiful is coming...</p></div>
  <div id="s3" class="text"><p>Our hearts are ready...</p></div>
  <div id="s4" class="text"><p>Hold your breath...</p></div>
  <div id="s5" class="text name glow">GATIK</div>
</div>

<script>
const scenes = ["s1","s2","s3","s4"];
let i = 0;

function nextScene() {
  document.getElementById(scenes[i]).classList.remove("show");
  i++;

  if (i < scenes.length) {
    document.getElementById(scenes[i]).classList.add("show");
    setTimeout(nextScene, 1500);
  } else {
    setTimeout(reveal, 1200);
  }
}

function reveal() {
  const flash = document.getElementById("flash");
  flash.style.opacity = 1;

  setTimeout(() => {
    flash.style.opacity = 0;
    document.getElementById("s5").classList.add("show");
  }, 300);
}

// Start after short delay
setTimeout(nextScene, 1200);
</script>

</body>
</html>
