<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baby Reveal</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle at center, #0b0b0f, #000);
  overflow: hidden;
  font-family: 'Arial Black', sans-serif;
  color: white;
}

/* Center container */
.container {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* Cinematic text */
.text {
  position: absolute;
  opacity: 0;
  transform: scale(0.9);
  transition: all 1.5s ease;
  text-align: center;
  letter-spacing: 3px;
}

.show {
  opacity: 1;
  transform: scale(1);
}

/* Netflix style title */
.title {
  font-size: 2rem;
  text-transform: uppercase;
  color: #ccc;
}

/* Name reveal 3D */
.name {
  font-size: 3rem;
  color: gold;
  letter-spacing: 8px;
  text-shadow:
    0 2px 0 #b89600,
    0 4px 0 #a38300,
    0 8px 15px rgba(255,215,0,0.5),
    0 0 40px gold;
  transform: perspective(800px) rotateX(10deg);
}

/* Shockwave */
.shockwave {
  position: absolute;
  width: 100px;
  height: 100px;
  border-radius: 50%;
  border: 2px solid gold;
  opacity: 0;
}

@keyframes shock {
  0% {
    transform: scale(0.2);
    opacity: 1;
  }
  100% {
    transform: scale(8);
    opacity: 0;
  }
}

/* Glow pulse */
@keyframes glowPulse {
  0% { text-shadow: 0 0 10px gold; }
  50% { text-shadow: 0 0 40px gold; }
  100% { text-shadow: 0 0 10px gold; }
}

.glow {
  animation: glowPulse 2s infinite;
}

/* Canvas */
canvas {
  position: absolute;
  top: 0;
  left: 0;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="container">

  <div id="s1" class="text title">A new soul arrives...</div>
  <div id="s2" class="text title">A new journey begins...</div>
  <div id="s3" class="text title">Our hearts are full...</div>

  <div id="s4" class="text title glow">It's a Boy</div>

  <div id="s5" class="text title">Presenting...</div>

  <div id="s6" class="text">
    <div class="name">GATIK</div>
  </div>

  <div id="shock" class="shockwave"></div>

</div>

<script>
// SCENE FLOW
const scenes = ["s1","s2","s3","s4","s5","s6"];
let i = 0;

function nextScene() {
  if (i > 0) {
    document.getElementById(scenes[i - 1]).classList.remove("show");
  }

  if (i < scenes.length) {
    document.getElementById(scenes[i]).classList.add("show");

    // Trigger shockwave on final reveal
    if (i === 5) triggerShockwave();

    i++;
    setTimeout(nextScene, i === 5 ? 2500 : 1800);
  }
}

setTimeout(nextScene, 1000);


// SHOCKWAVE
function triggerShockwave() {
  const shock = document.getElementById("shock");
  shock.style.left = "50%";
  shock.style.top = "50%";
  shock.style.transform = "translate(-50%, -50%)";
  shock.style.animation = "shock 1.5s ease-out";
}


// GOLDEN PARTICLES
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 120; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    size: Math.random() * 2,
    speedX: (Math.random() - 0.5),
    speedY: (Math.random() - 0.5)
  });
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  particles.forEach(p => {
    p.x += p.speedX;
    p.y += p.speedY;

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = "gold";
    ctx.fill();
  });

  requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
