<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baby Reveal</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle, #1a1200, #000);
  font-family: Arial, sans-serif;
  color: white;
  overflow: hidden;
}

.container {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
}

/* Scenes */
.text {
  position: absolute;
  width: 90%;
  opacity: 0;
  transform: translateY(30px);
  transition: all 2s ease;
}

.show {
  opacity: 1;
  transform: translateY(0);
}

.text p {
  font-size: clamp(18px, 5vw, 24px);
}

/* PHOTO */
.photo {
  position: absolute;
  width: 70%;
  max-width: 300px;
  border-radius: 20px;
  opacity: 0;
  transform: scale(0.9);
  transition: all 2s ease;
  box-shadow: 0 0 40px rgba(255,215,0,0.4);
}

.photo.show {
  opacity: 1;
  transform: scale(1.05);
}

/* Name block */
#nameBlock {
  position: absolute;
  text-align: center;
  opacity: 0;
  transition: opacity 2s ease;
}

#nameBlock.show {
  opacity: 1;
}

.name {
  font-size: clamp(40px, 10vw, 60px);
  color: gold;
  letter-spacing: 12px;
}

/* Letters */
.letter {
  display: inline-block;
  opacity: 0;
  transform: scale(0.4) translateY(30px);
  transition: all 0.8s ease;
}

.letter.show {
  opacity: 1;
  transform: scale(1) translateY(0);
  text-shadow: 0 0 25px gold;
}

/* Meaning */
.meaning {
  margin-top: 14px;
  font-size: clamp(16px, 4vw, 20px);
  color: #ddd;
  opacity: 0;
  transition: opacity 2s ease;
}

.meaning.show {
  opacity: 1;
}

/* Flash */
.flash {
  position: absolute;
  width: 100%;
  height: 100%;
  background: white;
  opacity: 0;
  transition: opacity 0.6s;
}

/* Canvas */
canvas {
  position: absolute;
  top: 0;
  left: 0;
}
</style>
</head>

<body>

<div id="flash" class="flash"></div>
<canvas id="canvas"></canvas>

<div class="container">

  <div id="s1" class="text show">
    <p>In a world that never pauses…<br>something extraordinary did.</p>
  </div>

  <div id="s2" class="text">
    <p>Not loud…<br>not sudden…<br>but powerful.</p>
  </div>

  <div id="s3" class="text">
    <p>A presence.<br>A purpose.<br>A beginning.</p>
  </div>

  <div id="s4" class="text">
    <p>He is not just born…<br>he is meant to be.</p>
  </div>

  <!-- PHOTO -->
  <img id="photo" class="photo" src="baby.jpg" />

  <div id="s5" class="text">
    <p>✨ Presenting…</p>
  </div>

  <!-- Name -->
  <div id="nameBlock">
    <div id="name" class="name"></div>
    <div id="meaning" class="meaning">
      A person who moves forward with speed and purpose
    </div>
  </div>

</div>

<script>
const scenes = ["s1","s2","s3","s4"];
let i = 0;

function nextScene() {
  document.getElementById(scenes[i]).classList.remove("show");
  i++;

  if (i < scenes.length) {
    document.getElementById(scenes[i]).classList.add("show");
    setTimeout(nextScene, 3000);
  } else {
    showPhoto();
  }
}

// PHOTO FLOW
function showPhoto() {
  const photo = document.getElementById("photo");
  photo.classList.add("show");

  setTimeout(() => {
    photo.classList.remove("show");

    setTimeout(() => {
      document.getElementById("s5").classList.add("show");

      setTimeout(() => {
        reveal();
      }, 2500);

    }, 1500);

  }, 3500);
}

// REVEAL
function reveal() {
  const flash = document.getElementById("flash");
  flash.style.opacity = 1;

  setTimeout(() => {
    flash.style.opacity = 0;
    showNameLetters();
  }, 600);
}

// LETTERS
function showNameLetters() {
  const name = "GATIK";
  const container = document.getElementById("name");
  const block = document.getElementById("nameBlock");

  block.classList.add("show");

  name.split("").forEach((char, index) => {
    const span = document.createElement("span");
    span.textContent = char;
    span.classList.add("letter");
    container.appendChild(span);

    setTimeout(() => {
      span.classList.add("show");

      if (index === name.length - 1) {
        setTimeout(() => {
          document.getElementById("meaning").classList.add("show");
        }, 5000);
      }

    }, index * 1200);
  });
}

setTimeout(nextScene, 2000);
</script>

</body>
</html>
