<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baby Reveal</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle, #1a1200, #000);
  font-family: Arial, sans-serif;
  color: white;
  overflow: hidden;
}

.container {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
}

/* Text */
.text {
  position: absolute;
  width: 90%;
  opacity: 0;
  transform: translateY(20px);
  transition: all 1.2s ease;
}

.show {
  opacity: 1;
  transform: translateY(0);
}

.text p {
  font-size: clamp(18px, 5vw, 24px);
  line-height: 1.5;
}

/* Name */
.name {
  font-size: clamp(40px, 10vw, 60px);
  color: gold;
  letter-spacing: 6px;
  text-shadow: 0 0 20px gold;
}

/* Glow pulse */
@keyframes glow {
  0% { text-shadow: 0 0 10px gold; }
  50% { text-shadow: 0 0 40px gold; }
  100% { text-shadow: 0 0 10px gold; }
}

.glow {
  animation: glow 2s infinite;
}

/* Flash */
.flash {
  position: absolute;
  width: 100%;
  height: 100%;
  background: white;
  opacity: 0;
  transition: opacity 0.3s;
}
</style>
</head>

<body>

<div id="flash" class="flash"></div>

<div class="container">

  <!-- Beat 1 -->
  <div id="s1" class="text show">
    <p>In a world that never pauses…<br>something extraordinary did.</p>
  </div>

  <!-- Beat 2 -->
  <div id="s2" class="text">
    <p>Not loud…<br>not sudden…<br>but powerful.</p>
  </div>

  <!-- Beat 3 -->
  <div id="s3" class="text">
    <p>A presence.<br>A purpose.<br>A beginning.</p>
  </div>

  <!-- Beat 4 -->
  <div id="s4" class="text">
    <p>He is not just born…<br>he is meant to be.</p>
  </div>

  <!-- Beat 5 -->
  <div id="s5" class="text glow">
    <p>✨ Presenting…</p>
  </div>

  <!-- Final Reveal -->
  <div id="s6" class="text name">
    GATIK
  </div>

</div>

<script>
const scenes = ["s1","s2","s3","s4","s5"];
let i = 0;

function nextScene() {
  document.getElementById(scenes[i]).classList.remove("show");
  i++;

  if (i < scenes.length) {
    document.getElementById(scenes[i]).classList.add("show");

    // Slightly longer pause near climax
    let delay = (i === 4) ? 2000 : 1600;

    setTimeout(nextScene, delay);
  } else {
    // Suspense pause before name
    setTimeout(reveal, 1400);
  }
}

function reveal() {
  const flash = document.getElementById("flash");
  flash.style.opacity = 1;

  setTimeout(() => {
    flash.style.opacity = 0;
    document.getElementById("s6").classList.add("show");
  }, 300);
}

// Start
setTimeout(nextScene, 1200);
</script>

</body>
</html>
